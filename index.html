<!DOCTYPE html>
<html lang="es" data-mode="fuego" data-theme="brutal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ukulele</title>
    <meta name="description" content="Afinador de ukulele online — meowrhino studio">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="icon" href="favicon/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="tuner-display" id="tunerDisplay">
            <div class="note-display" id="noteDisplay">—</div>
            <div class="frequency" id="freqDisplay">Hz</div>
            <div class="meter-container">
                <div class="meter-labels">
                    <span aria-label="bemol">♭</span>
                    <span aria-label="afinado">✓</span>
                    <span aria-label="sostenido">♯</span>
                </div>
                <div class="meter">
                    <div class="meter-bar">
                        <div class="meter-indicator" id="meterIndicator"></div>
                    </div>
                </div>
                <div class="cents" id="centsDisplay">0 cents</div>
            </div>
            <div class="tuning-status" id="tuningStatus" aria-live="polite">selecciona una cuerda o activa el micrófono</div>
        </section>

        <section class="strings-section">
            <div class="strings-grid">
                <button class="string-btn" data-note="G4" data-freq="392.00" data-string="4">
                    <span class="string-number">4</span>
                    <span class="string-note">G</span>
                    <span class="string-freq">392 Hz</span>
                </button>
                <button class="string-btn" data-note="C4" data-freq="261.63" data-string="3">
                    <span class="string-number">3</span>
                    <span class="string-note">C</span>
                    <span class="string-freq">262 Hz</span>
                </button>
                <button class="string-btn" data-note="E4" data-freq="329.63" data-string="2">
                    <span class="string-number">2</span>
                    <span class="string-note">E</span>
                    <span class="string-freq">330 Hz</span>
                </button>
                <button class="string-btn" data-note="A4" data-freq="440.00" data-string="1">
                    <span class="string-number">1</span>
                    <span class="string-note">A</span>
                    <span class="string-freq">440 Hz</span>
                </button>
            </div>
        </section>

        <section class="controls">
            <button class="mic-btn" id="micBtn" aria-pressed="false">
                <span class="mic-icon">🎤</span>
                <span class="mic-text">micrófono</span>
            </button>
            <button class="settings-btn" id="settingsBtn" aria-label="Configuración">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
            <button class="ref-btn" id="refBtn">
                <span class="ref-icon">🔊</span>
                <span class="ref-text">referencia</span>
            </button>
        </section>

        <div class="settings-backdrop" id="settingsBackdrop"></div>
        <section class="settings-panel" id="settingsPanel">
          <div class="settings-panel-inner">
            <span class="settings-section-title">elemento</span>
            <div class="modes-grid" id="modesGrid">
                <button class="mode-btn" data-mode="fuego">
                    <span class="mode-swatch mode-swatch-fuego"></span>
                    <span class="mode-name">fuego</span>
                </button>
                <button class="mode-btn" data-mode="tierra">
                    <span class="mode-swatch mode-swatch-tierra"></span>
                    <span class="mode-name">tierra</span>
                </button>
                <button class="mode-btn" data-mode="metal">
                    <span class="mode-swatch mode-swatch-metal"></span>
                    <span class="mode-name">metal</span>
                </button>
                <button class="mode-btn" data-mode="agua">
                    <span class="mode-swatch mode-swatch-agua"></span>
                    <span class="mode-name">agua</span>
                </button>
                <button class="mode-btn" data-mode="madera">
                    <span class="mode-swatch mode-swatch-madera"></span>
                    <span class="mode-name">madera</span>
                </button>
            </div>
            <div class="settings-divider"></div>
            <span class="settings-section-title">tema</span>
            <div class="themes-grid" id="themesGrid">
                <button class="theme-btn" data-theme="brutal">
                    <span class="theme-swatch theme-swatch-brutal"></span>
                    <span class="theme-name">brutal</span>
                </button>
                <button class="theme-btn" data-theme="minimal">
                    <span class="theme-swatch theme-swatch-minimal"></span>
                    <span class="theme-name">minimal</span>
                </button>
                <button class="theme-btn" data-theme="claro">
                    <span class="theme-swatch theme-swatch-claro"></span>
                    <span class="theme-name">claro</span>
                </button>
                <button class="theme-btn" data-theme="oscuro">
                    <span class="theme-swatch theme-swatch-oscuro"></span>
                    <span class="theme-name">oscuro</span>
                </button>
            </div>
          </div>
        </section>
    </main>

    <footer class="site-brand">
        <a href="https://meowrhino.studio" target="_blank" rel="noopener">meowrhino.studio</a>
    </footer>

    <script src="app.js"></script>
</body>
</html>
