<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Agua Oscuro: deep ink ocean, runic glyphs, navy-black (Most Yin) -->
  <defs>
    <linearGradient id="bg_a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06080e"/>
      <stop offset="100%" stop-color="#0c1628"/>
    </linearGradient>
    <linearGradient id="bd_a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6888b0"/>
      <stop offset="100%" stop-color="#2c4a7c"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" fill="url(#bg_a)"/>
  <rect x="1.5" y="1.5" width="45" height="45" fill="none" stroke="url(#bd_a)" stroke-width="1.5"/>
  <rect x="4" y="4" width="40" height="40" fill="none" stroke="#182840" stroke-width="0.5"/>
  <!-- runic circles on edges -->
  <circle cx="24" cy="2" r="1.2" fill="#8aa0c4" opacity="0.6"/>
  <circle cx="24" cy="46" r="1.2" fill="#3a5a88" opacity="0.6"/>
  <circle cx="2" cy="24" r="1.2" fill="#8aa0c4" opacity="0.6"/>
  <circle cx="46" cy="24" r="1.2" fill="#3a5a88" opacity="0.6"/>
  <line x1="20" y1="2" x2="28" y2="2" stroke="#8aa0c4" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="46" x2="28" y2="46" stroke="#3a5a88" stroke-width="0.6" opacity="0.4"/>
  <!-- corner triangles (ink drops) -->
  <polygon points="1,1 10,1 1,10" fill="#6888b0" opacity="0.7"/>
  <polygon points="47,1 38,1 47,10" fill="#3a5a88" opacity="0.7"/>
  <polygon points="1,47 1,38 10,47" fill="#3a5a88" opacity="0.7"/>
  <polygon points="47,47 38,47 47,38" fill="#6888b0" opacity="0.7"/>
</svg>
