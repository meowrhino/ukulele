  <path d="M12 46.5 L14 44 L16 46.5 L18 44 L20 46.5 L22 44 L24 46.5 L26 44 L28 46.5 L30 44 L32 46.5 L34 44 L36 46.5" fill="none" stroke="#e85540" stroke-width="1.2" stroke-linecap="round"/>
