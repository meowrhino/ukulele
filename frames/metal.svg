<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Metal Oscuro: industrial bevel, chrome on dark steel (bevel-retro inspired) -->
  <rect width="48" height="48" fill="#18181e"/>
  <!-- Outer bevel: bright top-left, dark bottom-right -->
  <line x1="0" y1="0" x2="48" y2="0" stroke="#d8d8e4" stroke-width="2"/>
  <line x1="0" y1="0" x2="0" y2="48" stroke="#d8d8e4" stroke-width="2"/>
  <line x1="0" y1="47" x2="48" y2="47" stroke="#2a2a34" stroke-width="2"/>
  <line x1="47" y1="0" x2="47" y2="48" stroke="#2a2a34" stroke-width="2"/>
  <!-- Inner bevel -->
  <line x1="3" y1="3" x2="45" y2="3" stroke="#b8b8c8" stroke-width="1"/>
  <line x1="3" y1="3" x2="3" y2="45" stroke="#b8b8c8" stroke-width="1"/>
  <line x1="3" y1="44" x2="45" y2="44" stroke="#40404a" stroke-width="1"/>
  <line x1="44" y1="3" x2="44" y2="45" stroke="#40404a" stroke-width="1"/>
  <!-- Rivet dots -->
  <circle cx="2" cy="2" r="1.5" fill="#8888a0" opacity="0.6"/>
  <circle cx="46" cy="2" r="1.5" fill="#8888a0" opacity="0.6"/>
  <circle cx="2" cy="46" r="1.5" fill="#60607a" opacity="0.6"/>
  <circle cx="46" cy="46" r="1.5" fill="#60607a" opacity="0.6"/>
</svg>
