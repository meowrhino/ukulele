<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Madera Claro: spring garden, soft teal on pale mint, leaf dots -->
  <rect width="48" height="48" fill="#eef6f2"/>
  <rect x="1.5" y="1.5" width="45" height="45" fill="none" stroke="#2d8b6f" stroke-width="1.2"/>
  <rect x="4" y="4" width="40" height="40" fill="none" stroke="#c0e0d4" stroke-width="0.6"/>
  <!-- organic L-bracket corners (vine-like) -->
  <path d="M1 10 Q1 1, 10 1" fill="none" stroke="#55b898" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M38 1 Q47 1, 47 10" fill="none" stroke="#2d8b6f" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M1 38 Q1 47, 10 47" fill="none" stroke="#2d8b6f" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M38 47 Q47 47, 47 38" fill="none" stroke="#55b898" stroke-width="1.5" stroke-linecap="round"/>
  <!-- leaf/seed dots along edges -->
  <circle cx="14" cy="1.5" r="1" fill="#2d8b6f" opacity="0.3"/>
  <circle cx="20" cy="2" r="0.7" fill="#55b898" opacity="0.3"/>
  <circle cx="26" cy="1.5" r="1" fill="#2d8b6f" opacity="0.3"/>
  <circle cx="32" cy="2" r="0.7" fill="#55b898" opacity="0.3"/>
  <circle cx="14" cy="46.5" r="1" fill="#1e6b50" opacity="0.3"/>
  <circle cx="20" cy="46" r="0.7" fill="#2d8b6f" opacity="0.3"/>
  <circle cx="26" cy="46.5" r="1" fill="#1e6b50" opacity="0.3"/>
  <circle cx="32" cy="46" r="0.7" fill="#2d8b6f" opacity="0.3"/>
  <!-- corner leaf accents -->
  <circle cx="4" cy="4" r="2" fill="#55b898" opacity="0.2"/>
  <circle cx="44" cy="4" r="2" fill="#2d8b6f" opacity="0.2"/>
  <circle cx="4" cy="44" r="2" fill="#2d8b6f" opacity="0.2"/>
  <circle cx="44" cy="44" r="2" fill="#55b898" opacity="0.2"/>
</svg>
